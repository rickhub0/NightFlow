<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #fff;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .task-item {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      font-size: 13px;
    }
    .priority-High { border-left: 3px solid #f87171; }
    .priority-Medium { border-left: 3px solid #fbbf24; }
    .priority-Low { border-left: 3px solid #34d399; }
    .empty {
      text-align: center;
      color: #666;
      font-size: 12px;
      padding: 20px;
    }
    .btn {
      background: #fff;
      color: #000;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <strong style="font-size: 16px;">NightFlow</strong>
    <span id="count" style="font-size: 12px; color: #666;">0 tasks</span>
  </div>
  <div id="tasks" class="task-list">
    <div class="empty">Loading tasks...</div>
  </div>
  <button class="btn" id="open-app">Open Dashboard</button>
  <script src="popup.js"></script>
</body>
</html>
